<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Crust & Crumb | Fast & Fresh — Cookies & Milk Rush</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background: #FEF7F0;
            font-family: 'Inter', sans-serif;
            color: #2E241F;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* ----- FLYING COOKIES & MILK ANIMATIONS (fast & chaotic) ----- */
        .flying-item {
            position: fixed;
            z-index: 999;
            pointer-events: none;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.2));
            animation: flyAround 4s linear infinite;
            will-change: transform;
        }

        @keyframes flyAround {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(calc(40vw - 50%), calc(30vh - 50%)) rotate(15deg);
            }
            50% {
                transform: translate(calc(-20vw + 50%), calc(60vh - 50%)) rotate(30deg);
            }
            75% {
                transform: translate(calc(60vw - 50%), calc(-10vh + 50%)) rotate(15deg);
            }
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        /* different delays and speeds for variety */
        .flying-item:nth-child(1) { animation-duration: 3.2s; animation-delay: 0s; }
        .flying-item:nth-child(2) { animation-duration: 2.8s; animation-delay: 0.5s; }
        .flying-item:nth-child(3) { animation-duration: 3.5s; animation-delay: 1.2s; }
        .flying-item:nth-child(4) { animation-duration: 2.5s; animation-delay: 0.3s; }
        .flying-item:nth-child(5) { animation-duration: 4s; animation-delay: 2s; }
        .flying-item:nth-child(6) { animation-duration: 3s; animation-delay: 1.5s; }
        .flying-item:nth-child(7) { animation-duration: 2.7s; animation-delay: 0.8s; }
        .flying-item:nth-child(8) { animation-duration: 3.8s; animation-delay: 2.2s; }
        .flying-item:nth-child(9) { animation-duration: 2.2s; animation-delay: 0.1s; }
        .flying-item:nth-child(10) { animation-duration: 3.3s; animation-delay: 1.8s; }

        .fly-cookie { font-size: 48px; display: inline-block; }
        .fly-milk { font-size: 52px; display: inline-block; }

        /* Custom cursor */
        .custom-cursor {
            position: fixed;
            width: 38px;
            height: 38px;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: transform 0.08s ease, width 0.2s, height 0.2s;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2L15 8H9L12 2Z" fill="%23D48C5B"/><circle cx="12" cy="14" r="6.5" fill="%23FADDB6" stroke="%23B56A3A" stroke-width="1.2"/><circle cx="9.5" cy="12.5" r="1.2" fill="%238B4513"/><circle cx="14.5" cy="12.5" r="1.2" fill="%238B4513"/><path d="M10 16.2 Q12 18 14 16.2" stroke="%238B4513" stroke-width="1" fill="none"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
        }
        .custom-cursor.hover {
            width: 52px;
            height: 52px;
            filter: drop-shadow(0 6px 14px rgba(195, 111, 58, 0.5));
        }

        /* main content */
        .bakery-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.8rem 2rem 3rem;
            position: relative;
            z-index: 10;
            background: rgba(254, 247, 240, 0.85);
            backdrop-filter: blur(3px);
            border-radius: 0 0 48px 48px;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 2px dashed #E7D6C2;
            animation: fadeSlideDown 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bakery-logo {
            font-family: 'Playfair Display', serif;
            font-size: 3.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #9E5E3A, #D48C5B);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .tagline {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #C57F4A;
            font-weight: 600;
            margin-top: 0.5rem;
        }
        .hero-sub {
            font-size: 1rem;
            color: #6C4F3A;
            background: rgba(255, 245, 235, 0.9);
            display: inline-block;
            padding: 0.4rem 1.4rem;
            border-radius: 80px;
            backdrop-filter: blur(4px);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3.5rem 0 2rem;
        }
        .cookie-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(70, 40, 20, 0.15);
            transition: all 0.3s ease;
            border: 1px solid #F7E8DB;
            animation: cardRise 0.5s ease forwards;
            opacity: 0;
            transform: translateY(25px);
        }
        .cookie-card:nth-child(1) { animation-delay: 0.1s; animation-fill-mode: forwards; }
        .cookie-card:nth-child(2) { animation-delay: 0.2s; animation-fill-mode: forwards; }
        .cookie-card:nth-child(3) { animation-delay: 0.3s; animation-fill-mode: forwards; }
        @keyframes cardRise {
            to { opacity: 1; transform: translateY(0); }
        }
        .cookie-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 28px 40px -12px rgba(156, 88, 38, 0.25);
            background: white;
        }

        .card-img {
            height: 240px;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: transform 0.4s;
        }
        .cookie-card:hover .card-img {
            transform: scale(1.02);
        }
        .price-badge {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: #FFF2E6;
            position: absolute;
            bottom: 16px;
            right: 16px;
            font-family: monospace;
        }
        .card-content {
            padding: 1.4rem 1.4rem 1.6rem;
        }
        .cookie-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            font-weight: 700;
            color: #36261E;
        }
        .cookie-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #C36F3A;
            margin: 0.3rem 0 0.5rem;
        }
        .cookie-desc {
            color: #735E4B;
            font-size: 0.85rem;
            border-left: 3px solid #E5CFBB;
            padding-left: 10px;
            margin: 0.5rem 0 1rem;
        }
        .order-qty {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .qty-control {
            display: flex;
            background: #F8EFE6;
            border-radius: 60px;
            border: 1px solid #E7D5C4;
        }
        .qty-btn {
            background: white;
            border: none;
            font-size: 1.3rem;
            font-weight: 600;
            width: 36px;
            height: 36px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s;
        }
        .add-to-cart {
            background: #2E241F;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-to-cart:hover {
            background: #C36F3A;
            gap: 12px;
        }

        .cart-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(6px);
            margin: 2rem 0 1.2rem;
            border-radius: 32px;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #F3E3D4;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px dotted #F0DECE;
            padding-bottom: 0.7rem;
        }
        .cart-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #A45F38;
        }
        #clearCart {
            background: none;
            border: none;
            color: #AD7A58;
            cursor: pointer;
        }
        .cart-items-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid #F3E3D4;
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 2px solid #EEDCCB;
            font-weight: 800;
        }
        .total-amount {
            color: #C36F3A;
            font-size: 1.6rem;
        }
        .checkout-btn {
            background: #D68348;
            border: none;
            padding: 0.6rem 1.6rem;
            border-radius: 50px;
            font-weight: 700;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .checkout-btn:hover {
            background: #B55D2E;
            transform: scale(0.98);
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #B89678;
            border-top: 1px solid #F0E0D0;
            padding-top: 1.2rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .payment-modal {
            background: white;
            max-width: 480px;
            width: 90%;
            border-radius: 2rem;
            padding: 1.8rem;
        }
        .close-modal {
            float: right;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .payment-option {
            background: #F9F1EA;
            border-radius: 60px;
            padding: 0.7rem 1rem;
            margin: 0.6rem 0;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .payment-option.selected { border-color: #C36F3A; background: #FFF4EA; }
        .card-details { display: none; margin-top: 1rem; }
        .card-details.active-card { display: block; }
        .input-group input {
            width: 100%;
            padding: 8px 12px;
            margin: 6px 0;
            border-radius: 60px;
            border: 1px solid #EAD2BE;
        }
        .pay-now-btn {
            background: #2E241F;
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            border: none;
            margin-top: 20px;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .bakery-wrapper { padding: 1rem; }
        }
    </style>
</head>
<body>

<!-- FLYING COOKIES & MILK -->
<div class="flying-item" style="top: 15%; left: 10%;"><div class="fly-cookie">🍪</div></div>
<div class="flying-item" style="top: 70%; left: 80%;"><div class="fly-milk">🥛</div></div>
<div class="flying-item" style="top: 40%; left: 30%;"><div class="fly-cookie">🍪</div></div>
<div class="flying-item" style="top: 85%; left: 15%;"><div class="fly-milk">🥛</div></div>
<div class="flying-item" style="top: 20%; left: 85%;"><div class="fly-cookie">🍪</div></div>
<div class="flying-item" style="top: 55%; left: 55%;"><div class="fly-milk">🥛</div></div>
<div class="flying-item" style="top: 10%; left: 45%;"><div class="fly-cookie">🍪</div></div>
<div class="flying-item" style="top: 90%; left: 65%;"><div class="fly-milk">🥛</div></div>
<div class="flying-item" style="top: 30%; left: 70%;"><div class="fly-cookie">🍪</div></div>
<div class="flying-item" style="top: 60%; left: 20%;"><div class="fly-milk">🥛</div></div>

<div class="custom-cursor" id="cookieCursor"></div>

<div class="bakery-wrapper">
    <div class="hero">
        <div class="bakery-logo">CRUST & CRUMB</div>
        <div class="tagline">✦ FAST FRESH COOKIES & MILK RUSH ✦</div>
        <div class="hero-sub">🍪🥛 zooming cookies & milk — grab them before they fly away!</div>
    </div>

    <div class="menu-grid" id="menuGrid"></div>

    <div class="cart-panel">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-bag"></i> Your basket</h2>
            <button id="clearCart"><i class="fas fa-trash-alt"></i> Clear</button>
        </div>
        <div id="cartContainer"><div style="text-align:center; padding:1rem;">🍪 No cookies yet — catch some!</div></div>
        <div class="cart-total" id="totalArea" style="display: none;">
            <span>Total</span>
            <span class="total-amount" id="cartTotal">₱0</span>
        </div>
        <div style="display: flex; justify-content: flex-end; margin-top: 1rem;">
            <button class="checkout-btn" id="openCheckout"><i class="fas fa-credit-card"></i> Secure Checkout</button>
        </div>
    </div>
    <div class="footer">
        <i class="fas fa-cookie-bite"></i> cookies & milk zooming — ultra fresh · crunchy speed
    </div>
</div>

<!-- Payment Modal -->
<div id="paymentModal" class="modal-overlay">
    <div class="payment-modal">
        <button class="close-modal" id="closeModalBtn">&times;</button>
        <h3 style="font-family:Playfair Display;">🍪 Fast Checkout</h3>
        <div id="modalSummary" style="background:#FEF4EA; padding:0.8rem; border-radius:1.2rem; margin:1rem 0;"></div>
        <div class="payment-option" data-method="paypal"><i class="fab fa-paypal"></i> PayPal</div>
        <div class="payment-option" data-method="applepay"><i class="fab fa-apple"></i> Apple Pay</div>
        <div class="payment-option" data-method="card"><i class="fas fa-credit-card"></i> Credit Card</div>
        <div id="cardDetails" class="card-details">
            <div class="input-group"><input type="text" id="cardNumber" placeholder="Card number"></div>
            <div class="input-group"><input type="text" id="expiry" placeholder="MM/YY"></div>
            <div class="input-group"><input type="password" id="cvc" placeholder="CVC"></div>
            <div class="input-group"><input type="text" id="cardHolder" placeholder="Full name"></div>
        </div>
        <button id="confirmPaymentBtn" class="pay-now-btn">Pay now</button>
    </div>
</div>

<script>
    // ========== MENU DATA with updated images ==========
    // Nutella: nutellastuffedcookies-4.jpg
    // M&M's: download.jpg (added as requested)
    // Chocolate Chip: clean gradient + icon (no external photo)
    const COOKIES = [
        { 
            id: "nutella", 
            name: "Nutella Cookies", 
            price: 400, 
            desc: "Gooey Nutella center · crackly top, pure bliss.", 
            img: "nutellastuffedcookies-4.jpg", 
            fallback: "fa-chocolate-bar",
            useImage: true
        },
        { 
            id: "mms", 
            name: "M&M's Cookies", 
            price: 200, 
            desc: "Rainbow candy crunch · chewy vanilla dough, colorful magic.", 
            img: "download.jpg",  // ADDED download.jpg for M&M's cookie
            fallback: "fa-candy-cane",
            useImage: true
        },
        { 
            id: "chocchip", 
            name: "Chocolate Chip Cookie", 
            price: 300, 
            desc: "Classic dark chocolate chunks · golden edges, melty center.", 
            img: "",  // no photo for chocolate chip (clean style)
            fallback: "fa-cookie",
            useImage: false
        }
    ];

    let cart = [];

    function saveCart() { localStorage.setItem("fastCrumbCart", JSON.stringify(cart)); }
    function loadCart() {
        const stored = localStorage.getItem("fastCrumbCart");
        if(stored) { try { cart = JSON.parse(stored).filter(i=>i.qty>0); } catch(e){ cart=[]; } }
        else cart=[];
        renderCart();
        syncQuantities();
    }

    function renderCart() {
        const container = document.getElementById("cartContainer");
        const totalDiv = document.getElementById("totalArea");
        const totalSpan = document.getElementById("cartTotal");
        if(cart.length===0){
            container.innerHTML = "<div style='text-align:center; padding:1rem;'>🍪 No cookies yet — catch some!</div>";
            totalDiv.style.display = "none";
            return;
        }
        let total = 0;
        let itemsHTML = `<ul class="cart-items-list">`;
        cart.forEach(item => {
            const itemTotal = item.price * item.qty;
            total += itemTotal;
            itemsHTML += `
                <li class="cart-item">
                    <div><i class="fas ${COOKIES.find(c=>c.id===item.id)?.fallback || 'fa-cookie'}"></i> ${item.name}</div>
                    <div>
                        Qty: ${item.qty}  ₱${itemTotal.toLocaleString()}
                        <button class="removeOne" data-id="${item.id}" style="background:none; border:none; color:#BB7E5A; margin-left:8px;"><i class="fas fa-minus-circle"></i></button>
                        <button class="removeAll" data-id="${item.id}" style="background:none; border:none; color:#BB7E5A;"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </li>
            `;
        });
        itemsHTML += `</ul>`;
        container.innerHTML = itemsHTML;
        totalSpan.innerText = `₱${total.toLocaleString()}`;
        totalDiv.style.display = "flex";
        document.querySelectorAll('.removeOne').forEach(btn => btn.addEventListener('click', (e) => modifyCart(btn.dataset.id, false)));
        document.querySelectorAll('.removeAll').forEach(btn => btn.addEventListener('click', (e) => modifyCart(btn.dataset.id, true)));
        saveCart();
        syncQuantities();
    }

    function modifyCart(id, deleteAll) {
        const index = cart.findIndex(i => i.id === id);
        if(index === -1) return;
        if(deleteAll || cart[index].qty === 1) cart.splice(index,1);
        else cart[index].qty--;
        renderCart();
    }

    function addToCart(cookieId, qtyToAdd) {
        if(qtyToAdd <= 0) return;
        const cookie = COOKIES.find(c=>c.id===cookieId);
        const existing = cart.find(i=>i.id===cookieId);
        if(existing) existing.qty += qtyToAdd;
        else cart.push({ id: cookie.id, name: cookie.name, price: cookie.price, qty: qtyToAdd });
        renderCart();
        showFlyingToast(`✨ +${cookie.name} added!`);
    }

    function showFlyingToast(msg) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#2E241F';
        toast.style.color = '#FFF1E0';
        toast.style.padding = '10px 24px';
        toast.style.borderRadius = '60px';
        toast.style.zIndex = '10001';
        toast.style.fontWeight = '500';
        toast.style.backdropFilter = 'blur(8px)';
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 1500);
    }

    function clearCartAll() { cart = []; renderCart(); }

    function syncQuantities() {
        COOKIES.forEach(cookie => {
            const cartItem = cart.find(i=>i.id===cookie.id);
            const inputField = document.getElementById(`qty-val-${cookie.id}`);
            if(inputField) inputField.value = cartItem ? cartItem.qty : 0;
        });
    }

    function buildMenu() {
        const grid = document.getElementById("menuGrid");
        grid.innerHTML = COOKIES.map(cookie => {
            // For Chocolate Chip: no photo, display stylish gradient + icon
            if(cookie.id === "chocchip") {
                return `
                    <div class="cookie-card">
                        <div class="card-img" style="background: linear-gradient(125deg, #FEEDDE, #FCE4D0); display: flex; align-items: center; justify-content: center; flex-direction: column;">
                            <i class="fas ${cookie.fallback}" style="font-size: 4rem; color: #D48C5B; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1));"></i>
                            <div style="background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); padding: 4px 12px; border-radius: 40px; margin-top: 12px; color: white; font-size: 0.8rem;">${cookie.name}</div>
                            <div class="price-badge" style="position: absolute; bottom: 16px; right: 16px;">🍪 ₱${cookie.price}</div>
                        </div>
                        <div class="card-content">
                            <div class="cookie-name">${cookie.name}</div>
                            <div class="cookie-price">₱${cookie.price}<small> / each</small></div>
                            <div class="cookie-desc">${cookie.desc}</div>
                            <div class="order-qty">
                                <div class="qty-control">
                                    <button class="qty-btn decr" data-id="${cookie.id}">−</button>
                                    <input type="text" class="qty-input" id="qty-val-${cookie.id}" value="0" readonly>
                                    <button class="qty-btn incr" data-id="${cookie.id}">+</button>
                                </div>
                                <button class="add-to-cart" data-id="${cookie.id}"><i class="fas fa-cart-plus"></i> Add</button>
                            </div>
                        </div>
                    </div>
                `;
            } 
            else {
                // For Nutella and M&M's (both have images)
                const imageUrl = cookie.img && cookie.img !== "" ? cookie.img : "";
                const bgStyle = imageUrl ? `background-image: url('${imageUrl}'); background-size: cover; background-position: center;` : `background: linear-gradient(135deg, #F7E3D2, #FBEBDC); display: flex; align-items: center; justify-content: center;`;
                const innerContent = imageUrl ? `<div class="price-badge">🍪 ₱${cookie.price}</div>` : `<i class="fas ${cookie.fallback}" style="font-size: 4rem; color: #D48C5B;"></i><div class="price-badge" style="position: absolute; bottom: 16px; right: 16px;">🍪 ₱${cookie.price}</div>`;
                return `
                    <div class="cookie-card">
                        <div class="card-img" style="${bgStyle}">
                            ${innerContent}
                        </div>
                        <div class="card-content">
                            <div class="cookie-name">${cookie.name}</div>
                            <div class="cookie-price">₱${cookie.price}<small> / each</small></div>
                            <div class="cookie-desc">${cookie.desc}</div>
                            <div class="order-qty">
                                <div class="qty-control">
                                    <button class="qty-btn decr" data-id="${cookie.id}">−</button>
                                    <input type="text" class="qty-input" id="qty-val-${cookie.id}" value="0" readonly>
                                    <button class="qty-btn incr" data-id="${cookie.id}">+</button>
                                </div>
                                <button class="add-to-cart" data-id="${cookie.id}"><i class="fas fa-cart-plus"></i> Add</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }).join('');

        // attach quantity controls for all
        COOKIES.forEach(cookie => {
            let localQty = 0;
            const inc = document.querySelector(`.incr[data-id="${cookie.id}"]`);
            const dec = document.querySelector(`.decr[data-id="${cookie.id}"]`);
            const addBtn = document.querySelector(`.add-to-cart[data-id="${cookie.id}"]`);
            const qtySpan = document.getElementById(`qty-val-${cookie.id}`);
            const updateUI = () => { if(qtySpan) qtySpan.value = localQty; };
            inc?.addEventListener('click', () => { localQty++; updateUI(); });
            dec?.addEventListener('click', () => { if(localQty>0) localQty--; updateUI(); });
            addBtn?.addEventListener('click', () => { if(localQty>0) { addToCart(cookie.id, localQty); localQty=0; updateUI(); } else showFlyingToast(`✨ Select qty first!`); });
        });

        // Fallback image error handling for Nutella & M&Ms (if images fail to load)
        const imageCards = document.querySelectorAll('.card-img');
        imageCards.forEach(div => {
            const bg = div.style.backgroundImage;
            if(bg && bg !== 'none' && bg.includes('url')) {
                const match = bg.match(/url\(["']?(.+?)["']?\)/);
                if(match && match[1]) {
                    const testImg = new Image();
                    testImg.src = match[1];
                    testImg.onerror = () => {
                        const parentCard = div.closest('.cookie-card');
                        const addBtn = parentCard?.querySelector('.add-to-cart');
                        const id = addBtn?.dataset.id;
                        const foundCookie = COOKIES.find(c=>c.id===id);
                        if(foundCookie && (foundCookie.id === "nutella" || foundCookie.id === "mms")) {
                            div.style.background = `linear-gradient(135deg, #F7E3D2, #FBEBDC)`;
                            div.style.display = 'flex';
                            div.style.alignItems = 'center';
                            div.style.justifyContent = 'center';
                            div.innerHTML = `<i class="fas ${foundCookie.fallback}" style="font-size: 3.8rem; color: #C47E5A;"></i><div class="price-badge" style="position: absolute; bottom: 16px; right: 16px;">🍪 ₱${foundCookie.price}</div>`;
                        }
                    };
                }
            }
        });
        syncQuantities();
    }

    // CURSOR
    const cursor = document.getElementById("cookieCursor");
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
    });
    document.querySelectorAll('button, .add-to-cart, .qty-btn, .checkout-btn, .payment-option').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // PAYMENT MODAL
    let selectedPayment = "paypal";
    const modal = document.getElementById("paymentModal");
    const openModalBtn = document.getElementById("openCheckout");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const confirmPay = document.getElementById("confirmPaymentBtn");
    const cardDetailsDiv = document.getElementById("cardDetails");
    const paymentOptions = document.querySelectorAll(".payment-option");
    const modalSummarySpan = document.getElementById("modalSummary");

    function updateModalTotal() {
        let total = cart.reduce((sum,i)=> sum + i.price*i.qty, 0);
        let count = cart.reduce((sum,i)=> sum + i.qty, 0);
        modalSummarySpan.innerHTML = `<strong>🍪 ${count} items</strong> &nbsp;|&nbsp; <strong>₱${total.toLocaleString()}</strong><br><small>secure & fast</small>`;
    }
    function openModalFunc() {
        if(cart.length === 0) { alert("Add some flying cookies first! 🍪"); return; }
        updateModalTotal();
        selectedPayment = "paypal";
        paymentOptions.forEach(opt => opt.classList.remove("selected"));
        document.querySelector('.payment-option[data-method="paypal"]').classList.add("selected");
        cardDetailsDiv.classList.remove("active-card");
        modal.classList.add("active");
    }
    function closeModalFunc() { modal.classList.remove("active"); }
    paymentOptions.forEach(opt => {
        opt.addEventListener("click", () => {
            paymentOptions.forEach(o=>o.classList.remove("selected"));
            opt.classList.add("selected");
            selectedPayment = opt.dataset.method;
            if(selectedPayment === "card") cardDetailsDiv.classList.add("active-card");
            else cardDetailsDiv.classList.remove("active-card");
        });
    });
    function processPayment() {
        if(cart.length===0){ alert("Cart empty"); closeModalFunc(); return; }
        const total = cart.reduce((s,i)=> s + i.price*i.qty,0);
        if(selectedPayment === "card"){
            const card = document.getElementById("cardNumber")?.value.trim();
            const exp = document.getElementById("expiry")?.value.trim();
            const cvc = document.getElementById("cvc")?.value.trim();
            const holder = document.getElementById("cardHolder")?.value.trim();
            if(!card || !exp || !cvc || !holder){ alert("Fill card details"); return; }
            alert(`💳 Card payment approved! Thanks ${holder}. Total: ₱${total}`);
        } else if(selectedPayment === "paypal") alert(`✅ PayPal success! ₱${total}`);
        else alert(`🍏 Apple Pay authorized! ₱${total}`);
        cart = [];
        renderCart();
        closeModalFunc();
        showFlyingToast("🎉 Order zooming to your kitchen!");
    }
    openModalBtn?.addEventListener("click", openModalFunc);
    closeModalBtn?.addEventListener("click", closeModalFunc);
    confirmPay?.addEventListener("click", processPayment);
    document.getElementById("clearCart")?.addEventListener("click", ()=> clearCartAll());
    modal?.addEventListener("click", (e) => { if(e.target === modal) closeModalFunc(); });

    document.addEventListener("DOMContentLoaded", () => { loadCart(); buildMenu(); });
</script>
</body>
</html>
